<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>oscar.brioso — iOS / Multi-Platform Engineer</title>
  <meta name="description" content="Oscar Allen Brioso — iOS & multi-platform engineer building precision-milled digital experiences." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:          #0a0a0b;
      --bg-elev:     #111114;
      --border:      #1d1d22;
      --border-2:    #2a2a30;
      --text:        #e7e7ea;
      --text-2:      #9a9aa3;
      --text-3:      #5e5e68;
      --accent:      #6ee7b7;
      --accent-soft: rgba(110,231,183,.12);
      --accent-line: rgba(110,231,183,.32);
      --mono: "JetBrains Mono","Fira Code",ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
      --col:     960px;
      --row-pad: 14px;
      --gap:     88px;
      --r-sm: 4px;
      --r-md: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { background: var(--bg); color: var(--text); }
    body { margin: 0; font-family: var(--mono); font-size: 14px; line-height: 1.55; font-feature-settings: "ss01","ss02","cv11","liga"; -webkit-font-smoothing: antialiased; }
    body::before { content: ""; position: fixed; inset: 0; pointer-events: none; background-image: linear-gradient(to right, rgba(255,255,255,.018) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,.018) 1px, transparent 1px); background-size: 80px 80px; z-index: 0; mask-image: radial-gradient(ellipse at top, rgba(0,0,0,1), rgba(0,0,0,.2)); }
    a { color: inherit; text-decoration: none; }
    ul { list-style: none; margin: 0; padding: 0; }
    ::selection { background: var(--accent-soft); color: var(--accent); }

    /* ── topbar ─────────────────────────────────────────────────────── */
    .topbar { position: sticky; top: 0; z-index: 30; background: rgba(10,10,11,.85); backdrop-filter: blur(12px) saturate(160%); -webkit-backdrop-filter: blur(12px) saturate(160%); border-bottom: 1px solid var(--border); }
    .topbar-inner { max-width: var(--col); margin: 0 auto; padding: 0 24px; height: 48px; display: flex; align-items: center; gap: 16px; font-size: 12.5px; }
    .tb-dots { display: flex; gap: 7px; }
    .tb-dots i { width: 11px; height: 11px; border-radius: 50%; display: block; }
    .tb-dots i:nth-child(1) { background: #f87171; opacity: .55; }
    .tb-dots i:nth-child(2) { background: #fbbf24; opacity: .55; }
    .tb-dots i:nth-child(3) { background: var(--accent); opacity: .55; }
    .tb-path { color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tb-path b { color: var(--text); font-weight: 500; }
    .tb-path .ac { color: var(--accent); }
    .tb-nav { margin-left: auto; display: flex; gap: 4px; }
    .tb-nav a { color: var(--text-2); font-size: 12.5px; padding: 5px 10px; border-radius: var(--r-sm); transition: color .15s, background .15s; }
    .tb-nav a:hover { color: var(--text); background: var(--bg-elev); }
    .tb-status { display: inline-flex; align-items: center; gap: 6px; color: var(--accent); font-size: 11.5px; padding-left: 12px; border-left: 1px solid var(--border); margin-left: 4px; white-space: nowrap; }
    .tb-status .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s ease-in-out infinite; flex-shrink: 0; }
    @keyframes pulse { 50% { opacity: .45; } }

    /* ── layout ─────────────────────────────────────────────────────── */
    .shell { position: relative; z-index: 1; max-width: var(--col); margin: 0 auto; padding: 0 24px 80px; }
    section { scroll-margin-top: 72px; }
    .section { padding-top: var(--gap); }
    .section-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 22px; }
    .section-head .tag { color: var(--accent); font-size: 12px; letter-spacing: .04em; }
    .section-head h2 { font-size: 20px; margin: 0; color: var(--text); font-weight: 500; letter-spacing: -.01em; }
    .section-head .meta { font-size: 11.5px; color: var(--text-3); margin-left: auto; }

    /* ── hero ───────────────────────────────────────────────────────── */
    .hero { padding-top: 80px; }
    .hero .prompt { color: var(--text-3); font-size: 12.5px; margin-bottom: 28px; display: flex; align-items: center; gap: 10px; }
    .hero .prompt b { color: var(--accent); font-weight: 500; }
    .hero .prompt .cmd { color: var(--text); }
    .cursor { display: inline-block; width: 8px; height: 14px; background: var(--accent); transform: translateY(2px); animation: blink 1.1s steps(2,start) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .hero h1 { margin: 0; font-size: clamp(40px,6.5vw,72px); line-height: .98; letter-spacing: -.025em; font-weight: 500; }
    .hero h1 .dot { color: var(--accent); }
    .hero .role { margin-top: 14px; font-size: 15px; color: var(--text-2); }
    .hero .role .arrow { color: var(--accent); }
    .hero .desc { margin-top: 28px; max-width: 60ch; color: var(--text-2); font-size: 14px; line-height: 1.7; }
    .hero .desc::before { content: "> "; color: var(--accent); }
    .hero .cta { margin-top: 32px; display: flex; gap: 10px; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; font-family: var(--mono); font-size: 13px; background: transparent; color: var(--text); border: 1px solid var(--border-2); border-radius: var(--r-sm); cursor: pointer; transition: border-color .15s, background .15s, color .15s; }
    .btn:hover { border-color: var(--accent-line); background: var(--accent-soft); color: var(--accent); }
    .btn .g { color: var(--accent); }
    .btn-primary { border-color: var(--accent-line); background: var(--accent-soft); color: var(--accent); }
    .btn-primary:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    .btn-primary:hover .g { color: var(--bg); }
    .kv-row { margin-top: 56px; display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: var(--border); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .kv { padding: 14px 16px; background: var(--bg); }
    .kv .k { font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase; color: var(--text-3); margin-bottom: 4px; }
    .kv .v { font-size: 13px; color: var(--text); }
    .kv .v .ac { color: var(--accent); }
    @media (max-width: 700px) { .kv-row { grid-template-columns: 1fr; } }

    /* ── experience ─────────────────────────────────────────────────── */
    .exp-list { border-top: 1px solid var(--border); }
    .exp { border-bottom: 1px solid var(--border); padding: var(--row-pad) 0; display: grid; grid-template-columns: 180px 1fr; gap: 24px; align-items: start; cursor: pointer; transition: background .15s; }
    .exp:hover { background: var(--bg-elev); padding-left: 8px; padding-right: 8px; margin-left: -8px; margin-right: -8px; }
    .exp .date { color: var(--text-3); font-size: 12px; padding-top: 4px; font-variant-numeric: tabular-nums; }
    .exp .title-row { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
    .exp .role { font-size: 15px; color: var(--text); font-weight: 500; }
    .exp .at { color: var(--text-3); }
    .exp .co { color: var(--accent); }
    .exp .xtag { font-size: 10.5px; color: var(--text-3); padding: 1px 7px; border: 1px solid var(--border-2); border-radius: 999px; letter-spacing: .03em; }
    .exp .xtag.current { color: var(--accent); border-color: var(--accent-line); background: var(--accent-soft); }
    .exp .toggle { margin-left: auto; color: var(--text-3); font-size: 11px; user-select: none; flex-shrink: 0; }
    .exp:hover .toggle { color: var(--text); }
    .exp .bullets { margin-top: 0; display: grid; gap: 6px; overflow: hidden; max-height: 0; opacity: 0; transition: max-height .35s ease, opacity .25s ease, margin-top .2s; }
    .exp.open .bullets { max-height: 800px; opacity: 1; margin-top: 12px; }
    .exp .bullets li { font-size: 13px; color: var(--text-2); padding-left: 18px; position: relative; line-height: 1.65; }
    .exp .bullets li::before { content: "▸"; position: absolute; left: 2px; color: var(--accent); font-size: 10px; top: 4px; }
    @media (max-width: 700px) { .exp { grid-template-columns: 1fr; gap: 6px; } }

    /* ── expertise ──────────────────────────────────────────────────── */
    .exp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
    @media (max-width: 700px) { .exp-grid { grid-template-columns: 1fr; } }
    .cat .num { color: var(--text-3); font-size: 11.5px; letter-spacing: .04em; margin-bottom: 4px; }
    .cat .ttl { font-size: 14.5px; color: var(--text); margin-bottom: 14px; }
    .cat .tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .cat .tags span { font-size: 12px; padding: 4px 10px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--r-sm); color: var(--text-2); transition: color .15s, border-color .15s, background .15s; }
    .cat .tags span:hover { color: var(--accent); border-color: var(--accent-line); background: var(--accent-soft); }

    /* ── projects ───────────────────────────────────────────────────── */
    .proj { display: grid; grid-template-columns: 1fr 320px; gap: 48px; padding: 36px 0; border-top: 1px solid var(--border); align-items: center; text-decoration: none; }
    .proj:last-child { border-bottom: 1px solid var(--border); }
    .proj .idx { color: var(--text-3); font-size: 11.5px; margin-bottom: 6px; letter-spacing: .04em; }
    .proj h3 { margin: 0 0 6px; font-size: 28px; font-weight: 500; letter-spacing: -.015em; color: var(--text); transition: color .15s; }
    .proj:hover h3 { color: var(--accent); }
    .proj h3 .ext { color: var(--text-3); font-size: 14px; margin-left: 6px; }
    .proj .ptags { display: flex; gap: 6px; margin: 14px 0 16px; flex-wrap: wrap; }
    .proj .ptags span { font-size: 11px; color: var(--accent); padding: 2px 8px; border: 1px solid var(--accent-line); background: var(--accent-soft); border-radius: 3px; }
    .proj .pdesc { color: var(--text-2); font-size: 13.5px; max-width: 50ch; line-height: 1.7; margin: 0; }
    .proj .read { margin-top: 18px; display: inline-flex; align-items: center; gap: 8px; color: var(--accent); font-size: 13px; }
    .proj:hover .read { text-decoration: underline; text-underline-offset: 4px; }
    .proj .arr { display: inline-block; transition: transform .2s; }
    .proj:hover .arr { transform: translateX(4px); }
    .phones { position: relative; height: 360px; display: flex; justify-content: center; align-items: center; }
    .phones .phone { position: absolute; width: 145px; aspect-ratio: 9/19.5; border-radius: 22px; overflow: hidden; background: #000; border: 1px solid var(--border-2); box-shadow: 0 24px 60px -10px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.04); transition: transform .35s cubic-bezier(.2,.7,.2,1); }
    .phones .phone img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; }
    .phones .phone:nth-child(1) { transform: translateX(-90px) rotate(-8deg) translateY(8px); z-index: 1; }
    .phones .phone:nth-child(2) { transform: translateX(0) rotate(0); z-index: 2; }
    .phones .phone:nth-child(3) { transform: translateX(90px) rotate(8deg) translateY(8px); z-index: 1; }
    .proj:hover .phones .phone:nth-child(1) { transform: translateX(-110px) rotate(-10deg) translateY(0); }
    .proj:hover .phones .phone:nth-child(3) { transform: translateX(110px) rotate(10deg) translateY(0); }
    @media (max-width: 800px) { .proj { grid-template-columns: 1fr; gap: 16px; } .phones { height: 280px; } }

    /* ── education ──────────────────────────────────────────────────── */
    .edu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
    @media (max-width: 700px) { .edu-grid { grid-template-columns: 1fr; } }
    .edu-block .lbl { color: var(--text-3); font-size: 11.5px; letter-spacing: .04em; margin-bottom: 12px; }
    .edu-item { padding: 14px 0; border-top: 1px solid var(--border); display: grid; grid-template-columns: 24px 1fr; gap: 14px; align-items: start; }
    .edu-item:last-child { border-bottom: 1px solid var(--border); }
    .edu-item .icon { color: var(--accent); font-size: 14px; padding-top: 2px; }
    .edu-item .name { font-size: 14px; color: var(--text); }
    .edu-item .det { font-size: 12.5px; color: var(--text-3); margin-top: 2px; }
    .edu-item .quote { font-size: 12px; color: var(--text-2); font-style: italic; margin-top: 8px; padding-left: 12px; border-left: 2px solid var(--accent-line); }

    /* ── contact ────────────────────────────────────────────────────── */
    .contact { margin-top: 60px; padding: 36px; border: 1px solid var(--border); border-radius: var(--r-md); background: linear-gradient(to bottom right, var(--bg-elev), var(--bg)); position: relative; overflow: hidden; }
    .contact::before { content: ""; position: absolute; inset: 0; background: radial-gradient(circle at top right, var(--accent-soft), transparent 60%); pointer-events: none; }
    .contact .cprompt { color: var(--text-3); font-size: 12.5px; margin-bottom: 18px; position: relative; }
    .contact .cprompt b { color: var(--accent); }
    .contact h2 { position: relative; font-size: clamp(28px,4vw,44px); margin: 0 0 24px; line-height: 1.05; font-weight: 500; letter-spacing: -.02em; max-width: 18ch; }
    .contact h2 .hi { color: var(--accent); }
    .contact .lines { position: relative; }
    .contact .line { display: grid; grid-template-columns: 80px 1fr auto; gap: 16px; padding: 10px 0; font-size: 13px; border-top: 1px dashed var(--border-2); align-items: center; }
    .contact .line:last-child { border-bottom: 1px dashed var(--border-2); }
    .contact .lbl { color: var(--accent); }
    .contact .val { color: var(--text); transition: color .15s; }
    .contact .val:hover { color: var(--accent); }
    .contact .val.muted { color: var(--text-3); }
    .copy-btn { color: var(--text-3); font-family: var(--mono); font-size: 11px; cursor: pointer; padding: 4px 8px; border: 1px solid var(--border-2); border-radius: 4px; background: transparent; transition: color .15s, border-color .15s; }
    .copy-btn:hover, .copy-btn.copied { color: var(--accent); border-color: var(--accent-line); }

    /* ── footer ─────────────────────────────────────────────────────── */
    footer { margin-top: 72px; padding-top: 24px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; color: var(--text-3); font-size: 11.5px; }
    .foot-links { display: flex; gap: 14px; }
    .foot-links a:hover { color: var(--accent); }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-inner">
      <div class="tb-dots" aria-hidden="true"><i></i><i></i><i></i></div>
      <div class="tb-path" id="tb-path"></div>
      <nav class="tb-nav" id="tb-nav"></nav>
      <div class="tb-status"><span class="dot"></span>available</div>
    </div>
  </div>

  <main class="shell">

    <section class="hero" id="top">
      <div class="prompt">
        <b>oscar</b><span style="color:var(--text-3)">@</span><b>portfolio</b><span style="color:var(--text-3)">:</span><span style="color:var(--accent)">~</span><span style="color:var(--text-3)">$</span>&nbsp;<span class="cmd">whoami</span>
        <span class="cursor"></span>
      </div>
      <h1 id="hero-name"></h1>
      <div class="role" id="hero-role"></div>
      <p class="desc" id="hero-desc"></p>
      <div class="cta" id="hero-cta"></div>
      <div class="kv-row" id="hero-kv"></div>
    </section>

    <section class="section" id="experience">
      <div class="section-head">
        <span class="tag">// 01</span>
        <h2>experience.log</h2>
        <span class="meta" id="exp-meta"></span>
      </div>
      <div class="exp-list" id="exp-list"></div>
    </section>

    <section class="section" id="expertise">
      <div class="section-head">
        <span class="tag">// 02</span>
        <h2>expertise</h2>
        <span class="meta">precision-milled stack</span>
      </div>
      <div class="exp-grid" id="exp-grid"></div>
    </section>

    <section class="section" id="projects">
      <div class="section-head">
        <span class="tag">// 03</span>
        <h2>projects</h2>
        <span class="meta" id="proj-meta"></span>
      </div>
      <div id="proj-list"></div>
    </section>

    <section class="section" id="education">
      <div class="section-head">
        <span class="tag">// 04</span>
        <h2>education</h2>
        <span class="meta">credentials</span>
      </div>
      <div class="edu-grid" id="edu-grid"></div>
    </section>

    <section class="section" id="contact">
      <div class="section-head">
        <span class="tag">// 05</span>
        <h2>contact</h2>
        <span class="meta">make contact</span>
      </div>
      <div class="contact" id="contact-box"></div>
    </section>

    <footer id="footer"></footer>

  </main>

  <script src="data.js"></script>
  <script>
    const D = SITE_DATA;

    /* ── topbar ───────────────────────────────────────────────────── */
    document.getElementById('tb-path').innerHTML =
      `<b>${D.brand}</b><span style="color:var(--text-3)"> — </span><span class="ac">~/portfolio</span><span style="color:var(--text-3)"> — zsh</span>`;

    document.getElementById('tb-nav').innerHTML =
      D.navLinks.map(l => `<a href="${l.href}">${l.label}</a>`).join('');

    /* ── hero ─────────────────────────────────────────────────────── */
    const h = D.hero;
    document.getElementById('hero-name').innerHTML =
      `${h.firstName} ${h.lastName}<span class="dot">.</span>`;

    document.getElementById('hero-role').innerHTML =
      `<span class="arrow">→ </span>${h.role}`;

    document.getElementById('hero-desc').textContent = h.description;

    document.getElementById('hero-cta').innerHTML = `
      <a href="${h.primaryButton.link}" class="btn btn-primary">
        <span class="g">▸</span>${h.primaryButton.text}
      </a>
      <a href="${h.secondaryButton.link}" class="btn" target="_blank" rel="noreferrer">
        <span class="g">↗</span>${h.secondaryButton.text}
      </a>`;

    document.getElementById('hero-kv').innerHTML = `
      <div class="kv"><div class="k">location</div><div class="v">${h.location}</div></div>
      <div class="kv"><div class="k">status</div><div class="v"><span class="ac">●</span> ${h.badge}</div></div>
      <div class="kv"><div class="k">currently</div><div class="v">${h.activeProgress}</div></div>`;

    /* ── experience ───────────────────────────────────────────────── */
    document.getElementById('exp-meta').textContent =
      `${D.experience.length} records · ordered desc`;

    document.getElementById('exp-list').innerHTML = D.experience.map((e, i) => `
      <div class="exp${i === 0 ? ' open' : ''}" data-idx="${i}">
        <div class="date">${e.date}</div>
        <div class="body">
          <div class="title-row">
            <span class="role">${e.role}</span>
            <span class="at">at</span>
            <span class="co">${e.company}</span>
            ${e.current ? '<span class="xtag current">current</span>' : ''}
            <span class="xtag">${e.employment}</span>
            <span class="toggle">${i === 0 ? '[ − ]' : '[ + ]'}</span>
          </div>
          <ul class="bullets">
            ${e.bullets.map(b => `<li>${b}</li>`).join('')}
          </ul>
        </div>
      </div>`).join('');

    document.getElementById('exp-list').addEventListener('click', e => {
      const row = e.target.closest('.exp');
      if (!row) return;
      const isOpen = row.classList.contains('open');
      row.classList.toggle('open', !isOpen);
      row.querySelector('.toggle').textContent = isOpen ? '[ + ]' : '[ − ]';
    });

    /* ── expertise ────────────────────────────────────────────────── */
    document.getElementById('exp-grid').innerHTML = D.expertise.map(c => `
      <div class="cat">
        <div class="num">${c.number} · ${c.tags.length} entries</div>
        <div class="ttl">${c.title}</div>
        <div class="tags">${c.tags.map(t => `<span>${t}</span>`).join('')}</div>
      </div>`).join('');

    /* ── projects ─────────────────────────────────────────────────── */
    document.getElementById('proj-meta').textContent =
      `selected works · ${D.projects.length}`;

    document.getElementById('proj-list').innerHTML = D.projects.map((p, i) => `
      <a href="${p.link}" class="proj">
        <div>
          <div class="idx">/${String(i+1).padStart(2,'0')} · ${p.year}</div>
          <h3>${p.title}<span class="ext"> ↗</span></h3>
          <div class="ptags">${p.tags.map(t => `<span>${t}</span>`).join('')}</div>
          <p class="pdesc">${p.tagline}</p>
          <span class="read">read case study <span class="arr">→</span></span>
        </div>
        <div class="phones">
          ${p.shots.map(s => `<div class="phone"><img src="${s}" alt="${p.title} screen" loading="lazy"></div>`).join('')}
        </div>
      </a>`).join('');

    /* ── education ────────────────────────────────────────────────── */
    const ed = D.education;
    document.getElementById('edu-grid').innerHTML = `
      <div class="edu-block">
        <div class="lbl">~ / academic</div>
        ${ed.academic.map(a => `
          <div class="edu-item">
            <div class="icon">◆</div>
            <div>
              <div class="name">${a.name}</div>
              <div class="det">${a.detail}</div>
              ${a.quote ? `<div class="quote">${a.quote}</div>` : ''}
            </div>
          </div>`).join('')}
      </div>
      <div class="edu-block">
        <div class="lbl">~ / certifications</div>
        ${ed.certifications.map(c => `
          <div class="edu-item">
            <div class="icon">▣</div>
            <div>
              <div class="name">${c.name}</div>
              <div class="det">${c.detail}</div>
            </div>
          </div>`).join('')}
      </div>`;

    /* ── contact ──────────────────────────────────────────────────── */
    const ct = D.contact;
    document.getElementById('contact-box').innerHTML = `
      <div class="cprompt">
        <b>oscar@portfolio</b><span style="color:var(--text-3)">:</span><span style="color:var(--accent)">~</span><span style="color:var(--text-3)">$</span> ./reach-out
      </div>
      <h2>${ct.title} <span class="hi">${ct.highlight}</span></h2>
      <div class="lines">
        ${ct.lines.map((l, i) => `
          <div class="line">
            <span class="lbl">→ ${l.label}</span>
            ${l.href
              ? `<a class="val" href="${l.href}"${l.href.startsWith('http') ? ' target="_blank" rel="noreferrer"' : ''}>${l.value}</a>`
              : `<span class="val muted">${l.value}</span>`
            }
            ${l.copy
              ? `<button class="copy-btn" data-copy="${l.copy}" data-idx="${i}">copy</button>`
              : `<span></span>`
            }
          </div>`).join('')}
      </div>`;

    document.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        navigator.clipboard?.writeText(btn.dataset.copy);
        btn.textContent = 'copied';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1500);
      });
    });

    /* ── footer ───────────────────────────────────────────────────── */
    const ft = D.footer;
    document.getElementById('footer').innerHTML = `
      <div><span style="color:var(--text-3)">// </span>© ${new Date().getFullYear()} Oscar Allen Brioso · ${ft.build}</div>
      <div class="foot-links">
        ${ft.links.map(l => `<a href="${l.url}" target="_blank" rel="noreferrer">${l.text}</a>`).join('')}
      </div>`;
  </script>
</body>
</html>
