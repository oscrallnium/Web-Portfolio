<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>oscar.brioso — iOS / Multi-Platform Engineer</title>
  <meta name="description" content="Oscar Allen Brioso — iOS & multi-platform engineer building precision-milled digital experiences." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── variables ────────────────────────────────────────────────── */
    :root {
      --bg:          #0a0a0b;
      --bg-elev:     #111114;
      --bg-elev-2:   #141417;
      --border:      #1d1d22;
      --border-2:    #2a2a30;
      --text:        #e7e7ea;
      --text-2:      #9a9aa3;
      --text-3:      #5e5e68;
      --text-4:      #3a3a42;
      --accent:      #6ee7b7;
      --accent-soft: rgba(110,231,183,.12);
      --accent-line: rgba(110,231,183,.32);
      --mono: "JetBrains Mono","Fira Code",ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
      --col:     960px;
      --row-pad: 14px;
      --gap:     88px;
      --r-sm: 4px;
      --r-md: 8px;
    }
    html[data-density="compact"] { --gap: 56px; --row-pad: 10px; }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { background: var(--bg); color: var(--text); }
    body {
      margin: 0;
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.55;
      font-feature-settings: "ss01","ss02","cv11","liga";
      -webkit-font-smoothing: antialiased;
    }

    /* subtle grid backdrop */
    body::before {
      content: "";
      position: fixed; inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(to right,  rgba(255,255,255,.018) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size: 80px 80px;
      z-index: 0;
      mask-image: radial-gradient(ellipse at top, rgba(0,0,0,1), rgba(0,0,0,.2));
    }

    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; }
    ::selection { background: var(--accent-soft); color: var(--accent); }

    /* ─── layout ────────────────────────────────────────────────────── */
    .shell {
      position: relative; z-index: 1;
      max-width: var(--col);
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    /* ─── topbar ─────────────────────────────────────────────────────── */
    .topbar {
      position: sticky; top: 0; z-index: 30;
      background: rgba(10,10,11,.85);
      backdrop-filter: blur(12px) saturate(160%);
      -webkit-backdrop-filter: blur(12px) saturate(160%);
      border-bottom: 1px solid var(--border);
    }
    .topbar-inner {
      max-width: var(--col); margin: 0 auto;
      padding: 0 24px; height: 48px;
      display: flex; align-items: center; gap: 16px;
      font-size: 12.5px;
    }
    .tb-dots { display: flex; gap: 7px; }
    .tb-dots i { width: 11px; height: 11px; border-radius: 50%; background: var(--border-2); display: block; }
    .tb-dots i:nth-child(1) { background: #f87171; opacity: .55; }
    .tb-dots i:nth-child(2) { background: #fbbf24; opacity: .55; }
    .tb-dots i:nth-child(3) { background: var(--accent); opacity: .55; }
    .tb-path { color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tb-path b { color: var(--text); font-weight: 500; }
    .tb-path .ac { color: var(--accent); }
    .tb-nav { margin-left: auto; display: flex; gap: 4px; }
    .tb-nav a { color: var(--text-2); font-size: 12.5px; padding: 5px 10px; border-radius: var(--r-sm); transition: color .15s, background .15s; }
    .tb-nav a:hover { color: var(--text); background: var(--bg-elev); }
    .tb-status { display: inline-flex; align-items: center; gap: 6px; color: var(--accent); font-size: 11.5px; padding-left: 12px; border-left: 1px solid var(--border); margin-left: 4px; }
    .tb-status .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 50% { opacity: .45; } }

    /* ─── section primitives ─────────────────────────────────────────── */
    section { scroll-margin-top: 72px; }
    .section { padding-top: var(--gap); }
    .section-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 22px; color: var(--text-2); }
    .section-head .tag { color: var(--accent); font-size: 12px; letter-spacing: .04em; }
    .section-head h2 { font-size: 20px; margin: 0; color: var(--text); font-weight: 500; letter-spacing: -.01em; }
    .section-head .meta { font-size: 11.5px; color: var(--text-3); margin-left: auto; }

    /* ─── hero ───────────────────────────────────────────────────────── */
    .hero { padding-top: 80px; }
    .hero .prompt { color: var(--text-3); font-size: 12.5px; margin-bottom: 28px; display: flex; align-items: center; gap: 10px; }
    .hero .prompt b { color: var(--accent); font-weight: 500; }
    .hero .prompt .cmd { color: var(--text); }
    .hero .prompt .cursor { display: inline-block; width: 8px; height: 14px; background: var(--accent); transform: translateY(2px); animation: blink 1.1s steps(2,start) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .hero h1 { margin: 0; font-size: clamp(40px,6.5vw,72px); line-height: .98; letter-spacing: -.025em; font-weight: 500; }
    .hero h1 .dot { color: var(--accent); }
    .hero .role { margin-top: 14px; font-size: 15px; color: var(--text-2); }
    .hero .role .arrow { color: var(--accent); }
    .hero .desc { margin-top: 28px; max-width: 60ch; color: var(--text-2); font-size: 14px; line-height: 1.7; }
    .hero .desc::before { content: "> "; color: var(--accent); }
    .hero .cta { margin-top: 32px; display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 16px; font-family: var(--mono); font-size: 13px;
      background: transparent; color: var(--text);
      border: 1px solid var(--border-2); border-radius: var(--r-sm);
      cursor: pointer; transition: border-color .15s, background .15s, color .15s;
    }
    .btn:hover { border-color: var(--accent-line); background: var(--accent-soft); color: var(--accent); }
    .btn .g { color: var(--accent); }
    .btn-primary { border-color: var(--accent-line); background: var(--accent-soft); color: var(--accent); }
    .btn-primary:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    .btn-primary:hover .g { color: var(--bg); }
    .hero .kv-row { margin-top: 56px; display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: var(--border); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .hero .kv { padding: 14px 16px; background: var(--bg); }
    .hero .kv .k { font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase; color: var(--text-3); margin-bottom: 4px; }
    .hero .kv .v { font-size: 13px; color: var(--text); }
    .hero .kv .v .ac { color: var(--accent); }
    @media (max-width: 700px) { .hero .kv-row { grid-template-columns: 1fr; } }

    /* ─── experience ─────────────────────────────────────────────────── */
    .exp-list { display: flex; flex-direction: column; border-top: 1px solid var(--border); }
    .exp { border-bottom: 1px solid var(--border); padding: var(--row-pad) 0; display: grid; grid-template-columns: 180px 1fr; gap: 24px; align-items: start; cursor: pointer; transition: background .15s; }
    .exp:hover { background: var(--bg-elev); }
    .exp .date { color: var(--text-3); font-size: 12px; padding-top: 4px; font-variant-numeric: tabular-nums; }
    .exp .body .title { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
    .exp .body .role { font-size: 15px; color: var(--text); font-weight: 500; }
    .exp .body .at { color: var(--text-3); }
    .exp .body .co { color: var(--accent); }
    .exp .body .xtag { font-size: 10.5px; color: var(--text-3); padding: 1px 7px; border: 1px solid var(--border-2); border-radius: 999px; letter-spacing: .03em; }
    .exp .body .xtag.current { color: var(--accent); border-color: var(--accent-line); background: var(--accent-soft); }
    .exp .toggle { margin-left: auto; color: var(--text-3); font-size: 11px; user-select: none; }
    .exp:hover .toggle { color: var(--text); }
    .exp .bullets { margin-top: 12px; display: grid; gap: 6px; overflow: hidden; max-height: 0; opacity: 0; transition: max-height .35s ease, opacity .2s ease; }
    .exp.open .bullets { max-height: 800px; opacity: 1; }
    .exp .bullets li { list-style: none; font-size: 13px; color: var(--text-2); padding-left: 18px; position: relative; line-height: 1.65; }
    .exp .bullets li::before { content: "▸"; position: absolute; left: 2px; color: var(--accent); font-size: 10px; top: 4px; }
    @media (max-width: 700px) { .exp { grid-template-columns: 1fr; gap: 6px; } }

    /* ─── expertise ──────────────────────────────────────────────────── */
    .exp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
    @media (max-width: 700px) { .exp-grid { grid-template-columns: 1fr; } }
    .cat .num { color: var(--text-3); font-size: 11.5px; letter-spacing: .04em; margin-bottom: 4px; }
    .cat .ttl { font-size: 14.5px; color: var(--text); margin-bottom: 14px; }
    .cat .tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .cat .tags span { font-size: 12px; padding: 4px 10px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--r-sm); color: var(--text-2); transition: color .15s, border-color .15s, background .15s; }
    .cat .tags span:hover { color: var(--accent); border-color: var(--accent-line); background: var(--accent-soft); }

    /* ─── projects ───────────────────────────────────────────────────── */
    .proj { display: grid; grid-template-columns: 1fr 320px; gap: 48px; padding: 36px 0; border-top: 1px solid var(--border); align-items: center; }
    .proj:last-child { border-bottom: 1px solid var(--border); }
    .proj .idx { color: var(--text-3); font-size: 11.5px; margin-bottom: 6px; letter-spacing: .04em; }
    .proj h3 { margin: 0 0 6px; font-size: 28px; font-weight: 500; letter-spacing: -.015em; color: var(--text); transition: color .15s; }
    .proj:hover h3 { color: var(--accent); }
    .proj h3 .ext { color: var(--text-3); font-size: 14px; margin-left: 6px; }
    .proj .ptags { display: flex; gap: 6px; margin: 14px 0 16px; flex-wrap: wrap; }
    .proj .ptags span { font-size: 11px; color: var(--accent); padding: 2px 8px; border: 1px solid var(--accent-line); background: var(--accent-soft); border-radius: 3px; }
    .proj .pdesc { color: var(--text-2); font-size: 13.5px; max-width: 50ch; line-height: 1.7; }
    .proj .read { margin-top: 18px; display: inline-flex; align-items: center; gap: 8px; color: var(--accent); font-size: 13px; }
    .proj .read:hover { text-decoration: underline; text-underline-offset: 4px; }
    .proj .read .arr { transition: transform .2s; }
    .proj .read:hover .arr { transform: translateX(4px); }

    /* phone stack mockup */
    .phones { position: relative; height: 360px; display: flex; justify-content: center; align-items: center; }
    .phones .phone { position: absolute; width: 145px; aspect-ratio: 9/19.5; border-radius: 22px; overflow: hidden; background: #000; border: 1px solid var(--border-2); box-shadow: 0 24px 60px -10px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.04); transition: transform .35s cubic-bezier(.2,.7,.2,1); }
    .phones .phone img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; }
    .phones .phone:nth-child(1) { transform: translateX(-90px) rotate(-8deg) translateY(8px); z-index: 1; }
    .phones .phone:nth-child(2) { transform: translateX(0) rotate(0); z-index: 2; }
    .phones .phone:nth-child(3) { transform: translateX(90px) rotate(8deg) translateY(8px); z-index: 1; }
    .proj:hover .phones .phone:nth-child(1) { transform: translateX(-110px) rotate(-10deg) translateY(0); }
    .proj:hover .phones .phone:nth-child(3) { transform: translateX(110px) rotate(10deg) translateY(0); }
    @media (max-width: 800px) { .proj { grid-template-columns: 1fr; gap: 16px; } .phones { height: 320px; order: -1; } }

    /* ─── education ──────────────────────────────────────────────────── */
    .edu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
    @media (max-width: 700px) { .edu-grid { grid-template-columns: 1fr; } }
    .edu-block .lbl { color: var(--text-3); font-size: 11.5px; letter-spacing: .04em; margin-bottom: 12px; }
    .edu-item { padding: 14px 0; border-top: 1px solid var(--border); display: grid; grid-template-columns: 24px 1fr; gap: 14px; align-items: start; }
    .edu-item:last-child { border-bottom: 1px solid var(--border); }
    .edu-item .icon { color: var(--accent); font-size: 14px; padding-top: 2px; }
    .edu-item .name { font-size: 14px; color: var(--text); }
    .edu-item .det { font-size: 12.5px; color: var(--text-3); margin-top: 2px; }
    .edu-item .quote { font-size: 12px; color: var(--text-2); font-style: italic; margin-top: 8px; padding-left: 12px; border-left: 2px solid var(--accent-line); }

    /* ─── contact ────────────────────────────────────────────────────── */
    .contact { margin-top: 60px; padding: 36px; border: 1px solid var(--border); border-radius: var(--r-md); background: linear-gradient(to bottom right, var(--bg-elev), var(--bg)); position: relative; overflow: hidden; }
    .contact::before { content: ""; position: absolute; inset: 0; background: radial-gradient(circle at top right, var(--accent-soft), transparent 60%); pointer-events: none; }
    .contact .cprompt { color: var(--text-3); font-size: 12.5px; margin-bottom: 18px; }
    .contact .cprompt b { color: var(--accent); }
    .contact h2 { position: relative; font-size: clamp(28px,4vw,44px); margin: 0 0 24px; line-height: 1.05; font-weight: 500; letter-spacing: -.02em; max-width: 18ch; }
    .contact h2 .hi { color: var(--accent); }
    .contact .lines { position: relative; }
    .contact .line { display: grid; grid-template-columns: 80px 1fr auto; gap: 16px; padding: 10px 0; font-size: 13px; border-top: 1px dashed var(--border-2); align-items: center; }
    .contact .line:last-child { border-bottom: 1px dashed var(--border-2); }
    .contact .line .lbl { color: var(--accent); }
    .contact .line .val { color: var(--text); }
    .contact .line .val:hover { color: var(--accent); }
    .contact .line .copy { color: var(--text-3); font-size: 11px; cursor: pointer; padding: 4px 8px; border: 1px solid var(--border-2); border-radius: 4px; background: transparent; transition: color .15s, border-color .15s; }
    .contact .line .copy:hover, .contact .line .copy.copied { color: var(--accent); border-color: var(--accent-line); }

    /* ─── footer ─────────────────────────────────────────────────────── */
    footer.foot { margin-top: 72px; padding-top: 24px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; color: var(--text-3); font-size: 11.5px; }
    .foot .lnks { display: flex; gap: 14px; }
    .foot .lnks a:hover { color: var(--accent); }

    /* ─── tweaks panel ───────────────────────────────────────────────── */
    .twk-panel { position: fixed; right: 16px; bottom: 16px; z-index: 9999; width: 280px; max-height: calc(100vh - 32px); display: flex; flex-direction: column; background: rgba(250,249,247,.82); color: #29261b; backdrop-filter: blur(24px) saturate(160%); -webkit-backdrop-filter: blur(24px) saturate(160%); border: .5px solid rgba(255,255,255,.6); border-radius: 14px; box-shadow: 0 12px 40px rgba(0,0,0,.2); font: 11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif; overflow: hidden; }
    .twk-hd { display: flex; align-items: center; justify-content: space-between; padding: 10px 8px 10px 14px; cursor: move; user-select: none; border-bottom: .5px solid rgba(0,0,0,.08); }
    .twk-hd b { font-size: 12px; font-weight: 600; }
    .twk-x { appearance: none; border: 0; background: transparent; color: rgba(41,38,27,.5); width: 22px; height: 22px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .twk-x:hover { background: rgba(0,0,0,.06); color: #29261b; }
    .twk-body { padding: 12px 14px 14px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; min-height: 0; }
    .twk-sect { font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: rgba(41,38,27,.4); padding-top: 8px; }
    .twk-row { display: flex; flex-direction: column; gap: 5px; }
    .twk-row-h { flex-direction: row; align-items: center; justify-content: space-between; }
    .twk-lbl { font-weight: 500; color: rgba(41,38,27,.72); font-size: 11.5px; }
    .twk-chips { display: flex; gap: 6px; }
    .twk-chip { flex: 1; height: 40px; border: 0; border-radius: 6px; cursor: pointer; box-shadow: 0 0 0 .5px rgba(0,0,0,.12); transition: transform .12s, box-shadow .12s; }
    .twk-chip:hover { transform: translateY(-1px); }
    .twk-chip[data-on="1"] { box-shadow: 0 0 0 2px rgba(0,0,0,.8); }
    .twk-seg { position: relative; display: flex; padding: 2px; border-radius: 8px; background: rgba(0,0,0,.06); }
    .twk-thumb { position: absolute; top: 2px; bottom: 2px; border-radius: 6px; background: rgba(255,255,255,.9); box-shadow: 0 1px 2px rgba(0,0,0,.12); transition: left .15s, width .15s; }
    .twk-seg button { position: relative; z-index: 1; flex: 1; border: 0; background: transparent; color: inherit; font: inherit; font-weight: 500; min-height: 22px; border-radius: 6px; cursor: pointer; padding: 4px 6px; }
    .twk-toggle { position: relative; width: 32px; height: 18px; border: 0; border-radius: 999px; background: rgba(0,0,0,.15); transition: background .15s; cursor: pointer; padding: 0; flex-shrink: 0; }
    .twk-toggle[data-on="1"] { background: #34c759; }
    .twk-toggle i { position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; border-radius: 50%; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,.25); transition: transform .15s; display: block; }
    .twk-toggle[data-on="1"] i { transform: translateX(14px); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="data.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ─── site data (loaded from data.js) ──────────────────────────── */
    const D = window.SITE_DATA;

    const ACCENT_OPTIONS = ["#6ee7b7","#f59e0b","#60a5fa","#f0abfc"];

    function hexToRgba(hex, a) {
      const n = hex.replace("#","");
      const r = parseInt(n.slice(0,2),16), g = parseInt(n.slice(2,4),16), b = parseInt(n.slice(4,6),16);
      return `rgba(${r},${g},${b},${a})`;
    }

    /* ─── TopBar ────────────────────────────────────────────────────── */
    function TopBar() {
      return (
        <div className="topbar">
          <div className="topbar-inner">
            <div className="tb-dots" aria-hidden="true"><i/><i/><i/></div>
            <div className="tb-path">
              <b>{D.brand}</b>
              <span style={{color:"var(--text-3)"}}> — </span>
              <span className="ac">~/portfolio</span>
              <span style={{color:"var(--text-3)"}}> — zsh</span>
            </div>
            <nav className="tb-nav">
              {D.navLinks.map(l => <a key={l.href} href={l.href}>{l.label}</a>)}
            </nav>
            <div className="tb-status">
              <span className="dot"/>
              available
            </div>
          </div>
        </div>
      );
    }

    /* ─── Hero ──────────────────────────────────────────────────────── */
    function Hero({ variant }) {
      const h = D.hero;
      const variants = {
        whoami: <><b>oscar</b><span style={{color:"var(--text-3)"}}>@</span><b>portfolio</b><span style={{color:"var(--text-3)"}}>:</span><span className="ac">~</span><span style={{color:"var(--text-3)"}}>$</span> <span className="cmd">whoami</span></>,
        splash: <><b>oscar</b><span style={{color:"var(--text-3)"}}>@</span><b>portfolio</b><span style={{color:"var(--text-3)"}}>:</span><span className="ac">~</span><span style={{color:"var(--text-3)"}}>$</span> <span className="cmd">cat ./about.txt</span></>,
        card:   <><b>oscar</b><span style={{color:"var(--text-3)"}}>@</span><b>portfolio</b><span style={{color:"var(--text-3)"}}>:</span><span className="ac">~</span><span style={{color:"var(--text-3)"}}>$</span> <span className="cmd">./introduce --me</span></>,
      };
      return (
        <section className="hero" id="top">
          <div className="prompt">
            {variants[variant] || variants.whoami}
            <span className="cursor"/>
          </div>
          <h1>{h.firstName} {h.lastName}<span className="dot">.</span></h1>
          <div className="role"><span className="arrow">→ </span>{h.role}</div>
          <p className="desc">{h.description}</p>
          <div className="cta">
            <a href={h.primaryButton.link} className="btn btn-primary">
              <span className="g">▸</span>{h.primaryButton.text}
            </a>
            <a href={h.secondaryButton.link} className="btn" target="_blank" rel="noreferrer">
              <span className="g">↗</span>{h.secondaryButton.text}
            </a>
          </div>
          <div className="kv-row">
            <div className="kv"><div className="k">location</div><div className="v">{h.location}</div></div>
            <div className="kv"><div className="k">status</div><div className="v"><span className="ac">●</span> {h.badge}</div></div>
            <div className="kv"><div className="k">currently</div><div className="v">{h.activeProgress}</div></div>
          </div>
        </section>
      );
    }

    /* ─── Experience ────────────────────────────────────────────────── */
    function Experience() {
      const [open, setOpen] = useState(0);
      return (
        <section className="section" id="experience">
          <div className="section-head">
            <span className="tag">// 01</span>
            <h2>experience.log</h2>
            <span className="meta">{D.experience.length} records · ordered desc</span>
          </div>
          <div className="exp-list">
            {D.experience.map((e, i) => (
              <div key={i} className={`exp${open === i ? " open" : ""}`}
                   onClick={() => setOpen(open === i ? -1 : i)}>
                <div className="date">{e.date}</div>
                <div className="body">
                  <div className="title">
                    <span className="role">{e.role}</span>
                    <span className="at">at</span>
                    <span className="co">{e.company}</span>
                    {e.current && <span className="xtag current">current</span>}
                    <span className="xtag">{e.employment}</span>
                    <span className="toggle">{open === i ? "[ − ]" : "[ + ]"}</span>
                  </div>
                  <ul className="bullets">
                    {e.bullets.map((b, j) => <li key={j}>{b}</li>)}
                  </ul>
                </div>
              </div>
            ))}
          </div>
        </section>
      );
    }

    /* ─── Expertise ─────────────────────────────────────────────────── */
    function Expertise() {
      return (
        <section className="section" id="expertise">
          <div className="section-head">
            <span className="tag">// 02</span>
            <h2>expertise</h2>
            <span className="meta">precision-milled stack</span>
          </div>
          <div className="exp-grid">
            {D.expertise.map(c => (
              <div key={c.number} className="cat">
                <div className="num">{c.number} · {c.tags.length} entries</div>
                <div className="ttl">{c.title}</div>
                <div className="tags">{c.tags.map(t => <span key={t}>{t}</span>)}</div>
              </div>
            ))}
          </div>
        </section>
      );
    }

    /* ─── Projects ──────────────────────────────────────────────────── */
    function Projects() {
      return (
        <section className="section" id="projects">
          <div className="section-head">
            <span className="tag">// 03</span>
            <h2>projects</h2>
            <span className="meta">selected works · {D.projects.length}</span>
          </div>
          {D.projects.map((p, i) => (
            <a key={p.slug} href={p.link} className="proj">
              <div>
                <div className="idx">/{String(i+1).padStart(2,"0")} · {p.year}</div>
                <h3>{p.title}<span className="ext"> ↗</span></h3>
                <div className="ptags">{p.tags.map(t => <span key={t}>{t}</span>)}</div>
                <p className="pdesc">{p.tagline}</p>
                <span className="read">read case study <span className="arr">→</span></span>
              </div>
              <div className="phones">
                {p.shots.map((s, j) => (
                  <div key={j} className="phone">
                    <img src={s} alt={`${p.title} screen ${j+1}`} />
                  </div>
                ))}
              </div>
            </a>
          ))}
        </section>
      );
    }

    /* ─── Education ─────────────────────────────────────────────────── */
    function Education() {
      const ed = D.education;
      return (
        <section className="section" id="education">
          <div className="section-head">
            <span className="tag">// 04</span>
            <h2>education</h2>
            <span className="meta">credentials</span>
          </div>
          <div className="edu-grid">
            <div className="edu-block">
              <div className="lbl">~ / academic</div>
              {ed.academic.map(a => (
                <div className="edu-item" key={a.name}>
                  <div className="icon">◆</div>
                  <div>
                    <div className="name">{a.name}</div>
                    <div className="det">{a.detail}</div>
                    {a.quote && <div className="quote">{a.quote}</div>}
                  </div>
                </div>
              ))}
            </div>
            <div className="edu-block">
              <div className="lbl">~ / certifications</div>
              {ed.certifications.map(c => (
                <div className="edu-item" key={c.name}>
                  <div className="icon">▣</div>
                  <div>
                    <div className="name">{c.name}</div>
                    <div className="det">{c.detail}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    /* ─── Contact ───────────────────────────────────────────────────── */
    function Contact() {
      const [copied, setCopied] = useState(null);
      const c = D.contact;
      const doCopy = (val, idx) => {
        if (!val) return;
        navigator.clipboard?.writeText(val);
        setCopied(idx);
        setTimeout(() => setCopied(null), 1500);
      };
      return (
        <section className="section" id="contact">
          <div className="section-head">
            <span className="tag">// 05</span>
            <h2>contact</h2>
            <span className="meta">make contact</span>
          </div>
          <div className="contact">
            <div className="cprompt">
              <b>oscar@portfolio</b>
              <span style={{color:"var(--text-3)"}}>:</span>
              <span style={{color:"var(--accent)"}}>~</span>
              <span style={{color:"var(--text-3)"}}>$</span>
              {" ./reach-out"}
            </div>
            <h2>{c.title} <span className="hi">{c.highlight}</span></h2>
            <div className="lines">
              {c.lines.map((l, i) => (
                <div className="line" key={i}>
                  <span className="lbl">→ {l.label}</span>
                  {l.href
                    ? <a className="val" href={l.href} target={l.href.startsWith("http") ? "_blank" : undefined} rel="noreferrer">{l.value}</a>
                    : <span className="val" style={{color:"var(--text-3)"}}>{l.value}</span>
                  }
                  {l.copy
                    ? <button type="button" className={`copy${copied === i ? " copied" : ""}`}
                              onClick={() => doCopy(l.copy, i)}>
                        {copied === i ? "copied" : "copy"}
                      </button>
                    : <span/>
                  }
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    /* ─── Footer ────────────────────────────────────────────────────── */
    function Footer() {
      return (
        <footer className="foot">
          <div>
            <span style={{color:"var(--text-3)"}}>// </span>
            © {new Date().getFullYear()} Oscar Allen Brioso · {D.footer.build}
          </div>
          <div className="lnks">
            {D.footer.links.map(l => (
              <a key={l.url} href={l.url} target="_blank" rel="noreferrer">{l.text}</a>
            ))}
          </div>
        </footer>
      );
    }

    /* ─── TweaksPanel ───────────────────────────────────────────────── */
    function TweaksPanel({ accent, showGrid, density, heroVariant,
                            onAccent, onGrid, onDensity, onVariant }) {
      const [open, setOpen] = useState(false);
      const ref = useRef(null);
      const pos = useRef({ x: 16, y: 16 });

      useEffect(() => {
        const h = e => {
          const t = e?.data?.type;
          if (t === "__activate_edit_mode")   setOpen(true);
          if (t === "__deactivate_edit_mode") setOpen(false);
        };
        window.addEventListener("message", h);
        window.parent.postMessage({ type: "__edit_mode_available" }, "*");
        return () => window.removeEventListener("message", h);
      }, []);

      const clamp = useCallback(() => {
        const p = ref.current; if (!p) return;
        const PAD = 16;
        pos.current = {
          x: Math.min(window.innerWidth  - p.offsetWidth  - PAD, Math.max(PAD, pos.current.x)),
          y: Math.min(window.innerHeight - p.offsetHeight - PAD, Math.max(PAD, pos.current.y)),
        };
        p.style.right  = pos.current.x + "px";
        p.style.bottom = pos.current.y + "px";
      }, []);

      const onDrag = e => {
        const p = ref.current; if (!p) return;
        const r  = p.getBoundingClientRect();
        const sx = e.clientX, sy = e.clientY;
        const sr = window.innerWidth - r.right, sb = window.innerHeight - r.bottom;
        const move = ev => { pos.current = { x: sr-(ev.clientX-sx), y: sb-(ev.clientY-sy) }; clamp(); };
        const up   = () => { window.removeEventListener("mousemove",move); window.removeEventListener("mouseup",up); };
        window.addEventListener("mousemove", move);
        window.addEventListener("mouseup",   up);
      };

      function Seg({ value, options, onChange }) {
        const idx = options.indexOf(value), n = options.length;
        return (
          <div className="twk-seg">
            <div className="twk-thumb" style={{ left:`calc(2px + ${idx}*(100% - 4px)/${n})`, width:`calc((100% - 4px)/${n})` }}/>
            {options.map(o => <button key={o} type="button" onClick={() => onChange(o)}>{o}</button>)}
          </div>
        );
      }

      if (!open) return null;
      return (
        <div ref={ref} className="twk-panel" style={{ right: pos.current.x, bottom: pos.current.y }}>
          <div className="twk-hd" onMouseDown={onDrag}>
            <b>Tweaks</b>
            <button className="twk-x" onMouseDown={e => e.stopPropagation()}
                    onClick={() => { setOpen(false); window.parent.postMessage({ type:"__edit_mode_dismissed" },"*"); }}>✕</button>
          </div>
          <div className="twk-body">
            <div className="twk-sect">Theme</div>
            <div className="twk-row">
              <div className="twk-lbl">Accent</div>
              <div className="twk-chips">
                {ACCENT_OPTIONS.map(o => (
                  <button key={o} type="button" className="twk-chip"
                          data-on={o===accent?"1":"0"}
                          style={{ background: o }}
                          onClick={() => onAccent(o)} />
                ))}
              </div>
            </div>
            <div className="twk-row twk-row-h">
              <div className="twk-lbl">Grid backdrop</div>
              <button type="button" className="twk-toggle" data-on={showGrid?"1":"0"}
                      onClick={() => onGrid(!showGrid)}><i/></button>
            </div>
            <div className="twk-sect">Layout</div>
            <div className="twk-row">
              <div className="twk-lbl">Density</div>
              <Seg value={density} options={["compact","regular"]} onChange={onDensity}/>
            </div>
            <div className="twk-sect">Hero</div>
            <div className="twk-row">
              <div className="twk-lbl">Prompt</div>
              <Seg value={heroVariant} options={["whoami","splash","card"]} onChange={onVariant}/>
            </div>
          </div>
        </div>
      );
    }

    /* ─── App ───────────────────────────────────────────────────────── */
    function App() {
      const [accent,  setAccent]  = useState("#6ee7b7");
      const [density, setDensity] = useState("regular");
      const [variant, setVariant] = useState("whoami");
      const [grid,    setGrid]    = useState(true);

      useEffect(() => {
        const r = document.documentElement;
        r.style.setProperty("--accent",       accent);
        r.style.setProperty("--accent-soft",  hexToRgba(accent,.12));
        r.style.setProperty("--accent-line",  hexToRgba(accent,.32));
        r.setAttribute("data-density", density);
      }, [accent, density]);

      useEffect(() => {
        let s = document.getElementById("_grid");
        if (!s) { s = document.createElement("style"); s.id = "_grid"; document.head.appendChild(s); }
        s.textContent = grid ? "" : "body::before{display:none!important}";
      }, [grid]);

      return (
        <>
          <TopBar/>
          <main className="shell">
            <Hero variant={variant}/>
            <Experience/>
            <Expertise/>
            <Projects/>
            <Education/>
            <Contact/>
            <Footer/>
          </main>
          <TweaksPanel
            accent={accent} showGrid={grid} density={density} heroVariant={variant}
            onAccent={setAccent} onGrid={setGrid} onDensity={setDensity} onVariant={setVariant}
          />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
